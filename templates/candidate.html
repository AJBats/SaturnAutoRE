<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>funcfinder eval</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div id="sticky-top">
    <div id="gap-alert" class="gap-alert hidden"></div>
    <header id="header">
      <span id="progress-content">loading…</span>
      <div id="scrubber" class="scrubber hidden" title="Click any segment to focus that function. Color = stamped confidence (HIGH/MEDIUM/LOW)."></div>
      <button id="btn-frontier" class="frontier-toggle" title="Frontier simulation: drop the next-stamp cap so the walker behaves as if THIS were the next unswept function. Use for auditing walker signal quality.">FRONTIER: OFF</button>
    </header>
    <div id="banners-row" class="banners-row">
      <div class="pane-banner primary-banner" id="banner-primary"></div>
      <div class="pane-banner natural-banner hidden" id="banner-natural"></div>
    </div>
  </div>

  <div class="listing-wrap" id="listing-wrap">
    <div class="listing-pane primary" id="pane-primary">
      <div class="listing-area">
        <pre class="listing" id="listing"></pre>
        <svg class="arcs" id="arcs"></svg>
      </div>
    </div>
    <div class="listing-pane natural hidden" id="pane-natural">
      <div class="listing-area">
        <pre class="listing" id="listing-natural"></pre>
      </div>
    </div>
  </div>

  <footer id="footer">
    <div class="verdict-row" id="verdict-row">
      <button id="btn-approve" data-verdict="approved">1 approve</button>
      <button id="btn-approve-data" title="Stamp the current candidate's range as a DATA subseg (literal bytes — LUT, table, padding).  No CFG analysis, no partners, no entries.">2 approve as data</button>
      <span id="partner-buttons" class="partner-buttons"></span>
      <button id="btn-audit" class="audit-toggle" title="Enter AUDIT MODE — walk through every stamped function with ←/→ and unstamp on demand.">audit</button>
      <span id="status" class="status">history: 0</span>
    </div>
    <div class="analyze-row hidden" id="analyze-row">
      <button id="btn-analyze-prev" title="previous block (←)">← prev block</button>
      <button id="btn-analyze-next" title="next block (→)">next block →</button>
      <button id="btn-analyze-exit" title="exit ANALYZE MODE">✕ exit ANALYZE MODE</button>
      <span id="analyze-status" class="status"></span>
    </div>
    <div class="audit-row hidden" id="audit-row">
      <button id="btn-audit-prev" title="previous stamped function (←)">← prev</button>
      <button id="btn-audit-next" title="next stamped function (→)">next →</button>
      <button id="btn-audit-unstamp" class="audit-unstamp" title="Unstamp the focused function; audit focus advances to the previous stamp.">unstamp</button>
      <button id="btn-audit-exit" title="exit AUDIT MODE">✕ exit AUDIT</button>
      <span id="audit-status" class="status"></span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='keys.js') }}"></script>
</body>
</html>
